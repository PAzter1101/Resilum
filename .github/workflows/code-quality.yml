name: Code Quality

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  python-lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip uv
        uv export --no-default-groups --group dev --no-emit-project --format requirements-txt \
          | pip install --require-hashes -r /dev/stdin

    - name: Check code formatting with Black
      run: black --check --diff bridges/ scripts/ tests/

    - name: Lint with Ruff
      run: ruff check bridges/ scripts/ tests/

    - name: Type check with mypy
      run: mypy --ignore-missing-imports bridges/ scripts/

    - name: Run unit tests
      run: pytest tests/unit -v

    - name: Run smoke tests
      run: pytest tests/smoke -v

  shellcheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Run shellcheck
      uses: ludeeus/action-shellcheck@master
      with:
        scandir: ./docker

  container-config-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7
    - name: Lint Dockerfile (hadolint)
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: docker/Dockerfile
    - name: Lint YAML (yamllint)
      run: |
        pip install yamllint==1.38.0
        yamllint docker-compose.yml config/defaults/
    - name: Validate Compose
      run: docker compose -f docker-compose.yml config -q
    - name: Lint Markdown (markdownlint)
      run: >
        npx --yes markdownlint-cli2@0.23.1
        README.md ARCHITECTURE.md bridges/rns_tcp_bridge/README.md

  docker-build-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    strategy:
      fail-fast: false
      matrix:
        profile: [lora, mesh, covert, full]
    steps:
    - uses: actions/checkout@v7
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build (no push) — verify ${{ matrix.profile }} on amd64 + arm64
      uses: docker/build-push-action@v7
      with:
        context: .
        file: docker/Dockerfile
        platforms: linux/amd64,linux/arm64
        push: false
        build-args: PROFILE=${{ matrix.profile }}
        cache-from: type=gha,scope=${{ matrix.profile }}
        cache-to: type=gha,mode=max,scope=${{ matrix.profile }}
