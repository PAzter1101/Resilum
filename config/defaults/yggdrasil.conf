# Default Yggdrasil configuration (HJSON format).
#
# Resilum runs every node in hybrid mode by default — each node
# simultaneously accepts incoming peers, dials out to public peers,
# and exposes a local TCP listener for the rns_tcp_bridge. There is
# no separate "anchor" or "client" role — peer-to-peer means every
# node carries traffic for the rest.
#
# The PrivateKey is populated automatically on first run by the
# entrypoint (`yggdrasil -genconf`). The PublicKey is derived from it
# and not stored in the config. Operators who want stable identity
# across rebuilds can paste their own private key here and re-deploy.

{
  PrivateKey: ""

  # Where this node accepts peer connections. The public slot is a
  # resilum:managed region — set RESILUM_YGG_PUBLIC_LISTEN (comma-separated
  # tcp://|tls:// URIs, IPv6 in [brackets]) to bind explicit addresses.
  # The loopback line (rns_tcp_bridge entry) stays outside the markers.
  #   tcp://127.0.0.1:9000 — local rns_tcp_bridge entry, always required.
  #   tcp://[::]:65533     — public peer slot, dual-stack (IPv4 + IPv6).
  Listen: [
    "tcp://127.0.0.1:9000"
    # >>> resilum:managed ygg-public-listen — rendered from RESILUM_YGG_PUBLIC_LISTEN
    "tcp://[::]:65533"
    # <<< resilum:managed
  ]

  # Outbound peers used to bootstrap into the global Yggdrasil mesh.
  # The list at https://publicpeers.neilalexander.dev/ is updated
  # regularly; replace these with peers geographically close to you
  # for lower RTT.
  Peers: [
    "tcp://ygg.mkg20001.io:443"
    "tls://ygg-uplink.thingylabs.io:443"
  ]

  IfName: ygg0
  IfMTU:  65535

  # Drop incoming traffic by default. Add specific peer keys here to
  # allow them to reach services bound on this node's ygg0 interface.
  AllowedPublicKeys: []

  # LAN auto-discovery. Harmless on a VPS; helpful when several
  # Resilum nodes share the same network.
  MulticastInterfaces: [
    {
      Regex:  ".*"
      Beacon: true
      Listen: true
      Port:   0
    }
  ]
}
