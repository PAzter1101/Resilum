# Default Resilum bridge configuration.
#
# Each entry becomes one long-running `rns_tcp_bridge` child process
# managed by the supervisor. The defaults below make the node a
# self-sufficient peer in the mesh — it advertises its services to
# others, and the operator can later add `connect` entries to dial
# into specific services on remote nodes.

bridges:
  # Expose the local Yggdrasil daemon to the Reticulum mesh.
  # Anyone who learns this destination's hash (printed on stdout the
  # first time the bridge starts) can peer with us through Reticulum
  # and reach the global Yggdrasil mesh through us. Disable by
  # commenting out if this node should not be a Yggdrasil entry point.
  - mode: listen
    service: yggdrasil
    identity: /config/bridges/yggdrasil.id
    tcp: 127.0.0.1:9000

  # Tor SOCKS gateway. Two things happen here:
  #
  #   1. The discovery plugin reads our local Tor hidden-service's
  #      .onion hostname and broadcasts it as the announce payload, so
  #      other Resilum nodes can dial us directly through the Tor
  #      network without knowing our IP.
  #
  #   2. The bridge tunnel itself forwards each incoming RNS Link to
  #      the local Tor SOCKS5 port (9050). Resilum nodes that don't
  #      have Tor of their own can speak SOCKS5 over the Link to use
  #      ours — a Tor-exit-as-a-service for the mesh.
  - mode: listen
    service: tor
    identity: /config/bridges/tor.id
    tcp: 127.0.0.1:9050

  # ── To dial a remote service through Reticulum, add a `connect`
  # ── entry like the example below and replace the `target` with the
  # ── destination hash printed by the remote node's listen-side
  # ── bridge:
  #
  # - mode: connect
  #   service: yggdrasil
  #   identity: /config/bridges/yggdrasil-out.id
  #   tcp: 127.0.0.1:9001
  #   target: <paste-remote-hash-here>

  # ── SOCKS-egress: symmetric public-IP exit between mesh peers.
  # ── Each node is *both* a potential exit (the listen side, fed by
  # ── a local `microsocks` started by the entrypoint) and a consumer
  # ── (the connect side, exposing a SOCKS5 endpoint on
  # ── 127.0.0.1:${RESILUM_SOCKS_PORT:-10808} for local apps).
  # ──
  # ── This mirrors how Tor relays work: using the network = being part
  # ── of the network. Operators who specifically don't want their
  # ── public IP used as an exit can disable the listen entry and set
  # ── ENABLE_SOCKS_EGRESS=0 to skip the local microsocks.
  # ──
  # ── The connect side has no static `target` — it auto-discovers a
  # ── live egress by listening for `resilum.socks-egress` announces
  # ── from other nodes. The first heard wins.
  - mode: listen
    service: socks-egress
    identity: /config/bridges/socks-egress.id
    tcp: 127.0.0.1:${RESILUM_SOCKS_EGRESS_PORT:-1080}

  - mode: connect
    service: socks-egress
    identity: /config/bridges/socks-egress-out.id
    tcp: 127.0.0.1:${RESILUM_SOCKS_PORT:-10808}

# ── Layer-3 VPN over Reticulum ────────────────────────────────────────
# A VPN tunnel routes any IP traffic (TCP, UDP, ICMP, QUIC, …) through
# the mesh, not just stream protocols. Two roles:
#
#   server — anchor with internet uplink. NATs client traffic out to
#            clearnet via iptables MASQUERADE on `--uplink`.
#   client — leaf without direct internet. Auto-discovers an anchor
#            via RNS announces, brings up tun0, points the host's
#            default route at it.
#
# Disabled by default — server mode requires that you know the host
# uplink interface, and a client-only node should opt in explicitly
# (it overrides the host default route, which is invasive). Uncomment
# whichever role applies and Compose-restart.
#
# MTU notes:
#   1280 — default. Standard VPN / minimum IPv6 MTU; works everywhere.
#                    On clearnet / Yggdrasil underlays, fast.
#   200–500 — recommended on LoRa-only nodes. Each IP packet then fits
#                    in 1–4 LoRa frames (≈ 0.2–0.8 s per packet on
#                    SF10/BW125), so interactive sessions stay usable.
#                    Bulk transfer suffers slightly more per-byte
#                    overhead, but throughput is anyway capped by
#                    LoRa airtime regardless of MTU.
#
# vpn:
#   - mode: server
#     identity: /config/vpn/server.id
#     subnet: 10.20.0.0/24
#     uplink: eth0
#     mtu: 1280
#
#   - mode: client
#     identity: /config/vpn/client.id
#     # No `target` here — the client discovers anchors automatically
#     # by listening for RNS announces on `resilum.vpn.gateway`.
#     mtu: 1280
