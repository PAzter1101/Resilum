# Resilum container — single Compose file with two mutually-exclusive
# profiles: `headless` (no LoRa hardware) and `lora` (with a LoRa radio
# attached over USB). See README → Quick start.
#
#   docker compose --profile headless up    # no radio attached
#   docker compose --profile lora up        # Heltec / RNode on /dev/ttyACM0
#
# Override the radio's device path with LORA_DEVICE if your radio is on a
# different node (e.g. CP2102-based RNodes show up as /dev/ttyUSB*):
#
#   LORA_DEVICE=/dev/ttyUSB0 docker compose --profile lora up

x-resilum-base: &resilum-base
  # Pre-built multi-arch image published to GitHub Container Registry.
  # Pulled automatically on first run; no local build required.
  # The `build:` block below is a fallback for developers and for
  # architectures we have not yet published (run `docker compose build`
  # explicitly to use it).
  image: ghcr.io/pazter1101/resilum:full
  build:
    context: .
    dockerfile: docker/Dockerfile
    args:
      PROFILE: full
      RESILUM_VERSION: "${RESILUM_VERSION:-0.0.0}"
  pull_policy: missing
  network_mode: host
  # Run as the host user so files in the bind-mounted ./config end up
  # owned by them, not by root. UID/GID default to 1000 (the typical
  # first user on Debian/Ubuntu/Arch); override on hosts where they
  # differ:
  #     UID=$(id -u) GID=$(id -g) docker compose --profile headless up
  user: "${UID:-1000}:${GID:-1000}"
  cap_add:
    - NET_ADMIN
    - SYS_ADMIN
  volumes:
    - ./config:/config
  restart: unless-stopped
  environment:
    # Toggle bundled daemons here. Each only takes effect if the chosen
    # image profile actually contains the corresponding binary; with the
    # default `full` image, all of these are available.
    # Yggdrasil is on by default because it is the IPv6 mesh that
    # makes the bridge actually useful out-of-the-box. The other
    # transports require operator-specific configuration (Tor relays,
    # I2P routers, DNS-tunnel domains) and are opt-in.
    ENABLE_YGGDRASIL: "1"
    ENABLE_I2PD: "1"
    ENABLE_TOR: "1"
    ENABLE_IODINE: "0"
    # Local SOCKS5 server (microsocks) so this node can serve as a
    # public-IP egress for other mesh peers. Off by default — opting
    # in means your public IP becomes the source of every peer's
    # outbound traffic that picks you, which has legal/abuse
    # implications. To enable, set ENABLE_SOCKS_EGRESS=1 and
    # uncomment the `listen socks-egress` entry in bridges.yaml.
    ENABLE_SOCKS_EGRESS: "${ENABLE_SOCKS_EGRESS:-0}"
    # Port microsocks listens on, container-internal. Bridge listen
    # entry in bridges.yaml forwards RNS Links here. Stays inside the
    # container — never exposed to the host.
    RESILUM_SOCKS_EGRESS_PORT: "${RESILUM_SOCKS_EGRESS_PORT:-1080}"
    # Port the connect-side bridge exposes on the host loopback for
    # local apps (curl, browser, ALL_PROXY env). Override per machine
    # via shell env or .env file when 10808 conflicts with other
    # SOCKS proxies (Xray's default is also 10808).
    RESILUM_SOCKS_PORT: "${RESILUM_SOCKS_PORT:-10808}"
    # Public listener bind addresses. Unset = the dual-stack default in the
    # seed configs (accepts IPv4 + IPv6). Set explicit comma-separated
    # addresses to bind specific IPs/ports (IPv6 in [brackets]); a malformed
    # value stops the container on purpose.
    #   RESILUM_YGG_PUBLIC_LISTEN: "tcp://203.0.113.10:65533,tcp://[2001:db8::1]:65533"
    #   RESILUM_RNS_LISTEN: "203.0.113.10:4242,[2001:db8::1]:4242"

services:
  # Run mode without LoRa hardware. Suitable for VPS, SBC bridges or just
  # poking at Reticulum from a laptop without a radio. The TUN device is
  # always exposed for future per-app packet routing.
  resilum:
    <<: *resilum-base
    profiles: [headless]
    devices:
      - /dev/net/tun:/dev/net/tun

  # Run mode with a LoRa radio (Heltec V4 / RNode) attached over USB.
  # Will fail to start if the device path does not exist on the host.
  resilum-lora:
    <<: *resilum-base
    profiles: [lora]
    devices:
      - /dev/net/tun:/dev/net/tun
      - "${LORA_DEVICE:-/dev/ttyACM0}:/dev/ttyACM0"
